<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gerador de Senhas | Frontend Mentor Challenge</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
  </head>
  <body>
    <main class="generator">
      <h1 class="generator__title">Password Generator</h1>

      <form action="" class="generator__title" novalidate>
        <div class="generator__display">
          <input
            type="text"
            class="generator__display-input"
            placeholder="P4$5W0rD!"
            readonly
            aria-label="Senha gerada"
          />
          <button
            type="button"
            id="copy"
            class="generator__copy-btn"
            aria-label="Copiar senha para a área de transferência"
          >
            <img
              src="./assets/images/icon-copy.svg"
              alt=""
              aria-hidden="true"
            />
          </button>
        </div>

        <div class="generator__settings">
          <div class="generator__length-header">
            <label for="password-length" class="generator__label">
              Número de caracteres
            </label>
            <span
              id="size-value"
              class="generator__length-counter"
              aria-live="polite"
            >
              0
            </span>
          </div>
          <input
            type="range"
            name="password-length"
            id="password-length"
            class="generator__slider"
            min="1"
            max="20"
            value="10"
          />

          <div class="generator__options">
            <div class="generator__option-item">
              <input
                type="checkbox"
                name="uppercase"
                id="uppercase"
                class="generator__checkbox"
              />
              <label for="uppercase" class="generator__checkbox-label">
                Incluir letras maiúsculas
              </label>
            </div>

            <div class="generator__option-item">
              <input
                type="checkbox"
                name="lowercase"
                id="lowercase"
                class="generator__checkbox"
              />
              <label for="lowercase" class="generator__checkbox-label">
                Incluir letras minúsculas
              </label>
            </div>

            <div class="generator__option-item">
              <input
                type="checkbox"
                name="numbers"
                id="numbers"
                class="generator__checkbox"
              />
              <label for="numbers" class="generator__checkbox-label">
                Incluir números
              </label>
            </div>

            <div class="generator__option-item">
              <input
                type="checkbox"
                name="symbols"
                id="symbols"
                class="generator__checkbox"
              />
              <label for="symbols" class="generator__checkbox-label">
                Incluir símbolos
              </label>
            </div>
          </div>

          <div class="strength-rating" aria-live="polite">
            <span class="strength-rating__title">Força</span>
            <div class="strength-rating__display">
              <span class="strength-rating__text">Média</span>
              <div class="strength-rating__bars" aria-hidden="true">
                <span class="strength-rating__bar"></span>
                <span class="strength-rating__bar"></span>
                <span class="strength-rating__bar"></span>
                <span class="strength-rating__bar"></span>
              </div>
            </div>
          </div>
        </div>

        <button type="submit" class="generator__submit-btn">
          Gerar
          <img
            src="./assets/images/icon-arrow-right.svg"
            alt=""
            aria-hidden="true"
          />
        </button>
      </form>
    </main>
  </body>
</html>
