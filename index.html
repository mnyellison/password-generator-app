<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gerador de Senhas | Frontend Mentor Challenge</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />

    <script
      src="https://kit.fontawesome.com/a16984c516.js"
      crossorigin="anonymous"
    ></script>
    <script src="./js/script.js" defer></script>
  </head>
  <body>
    <main class="generator">
      <h1 class="generator__title">Gerador de Senhas</h1>

      <form action="" class="generator__form" novalidate>
        <div class="generator__display">
          <input
            type="text"
            class="generator__display-input"
            placeholder="P4$5W0rD!"
            readonly
            aria-label="Senha gerada"
          />
          <span id="message-copied" class="generator__message-copied hidden">
            Copiado
          </span>
          <button
            type="button"
            id="copy"
            class="generator__copy-btn"
            aria-label="Copiar senha para a área de transferência"
          >
            <img
              src="./assets/images/icon-copy.svg"
              alt=""
              aria-hidden="true"
            />
          </button>
        </div>

        <div class="generator__settings">
          <div class="generator__length-header">
            <label for="password-length" class="generator__label">
              Número de caracteres
            </label>
            <span
              id="size-value"
              class="generator__length-counter"
              aria-live="polite"
            >
              10
            </span>
          </div>
          <input
            type="range"
            name="password-length"
            id="password-length"
            class="generator__slider"
            min="1"
            max="20"
            value="10"
          />

          <div class="generator__options">
            <div class="generator__option-item">
              <input
                type="checkbox"
                name="uppercase"
                id="uppercase"
                class="generator__checkbox"
              />
              <label for="uppercase" class="generator__checkbox-label">
                Incluir letras maiúsculas
              </label>
            </div>

            <div class="generator__option-item">
              <input
                type="checkbox"
                name="lowercase"
                id="lowercase"
                class="generator__checkbox"
              />
              <label for="lowercase" class="generator__checkbox-label">
                Incluir letras minúsculas
              </label>
            </div>

            <div class="generator__option-item">
              <input
                type="checkbox"
                name="numbers"
                id="numbers"
                class="generator__checkbox"
              />
              <label for="numbers" class="generator__checkbox-label">
                Incluir números
              </label>
            </div>

            <div class="generator__option-item">
              <input
                type="checkbox"
                name="symbols"
                id="symbols"
                class="generator__checkbox"
              />
              <label for="symbols" class="generator__checkbox-label">
                Incluir símbolos
              </label>
            </div>
          </div>

          <div class="generator__strength" aria-live="polite">
            <span class="generator__strength-title">Força</span>
            <div class="generator__strength-display">
              <span id="strength-text" class="generator__strength-text hidden">
                Média
              </span>
              <div class="generator__strength-bars" aria-hidden="true">
                <span class="generator__strength-bar"></span>
                <span class="generator__strength-bar"></span>
                <span class="generator__strength-bar"></span>
                <span class="generator__strength-bar"></span>
              </div>
            </div>
          </div>

          <button type="submit" class="generator__submit-btn">
            Gerar
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </form>
    </main>
  </body>
</html>
